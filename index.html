<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習式六法 - 終極雲端同步版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap');
        :root{ --red:#8b1a1a; --bg:#f5f0e8; --bg2:#ede7d9; --border:#c8bfb0; --gold:#b8860b; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Noto Sans TC',sans-serif;font-size:13pt;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

        /* 介面佈局 */
        .hdr{background:var(--red);color:#fff;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:200;flex-shrink:0}
        .hdr-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;letter-spacing:2px}
        .hbtn{padding:5px 12px;border-radius:3px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;margin-left:5px}
        .hbtn-ul{background:#fff;color:var(--red);font-weight:bold}

        .layout{display:flex;flex:1;overflow:hidden}
        .sb{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sb-list{flex:1;overflow-y:auto;padding:10px}
        .sb-itm{padding:10px;background:#fff;margin-bottom:8px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;transition:0.2s}
        .sb-itm:hover{border-color:var(--red);background:#fff9f9}

        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fffdfa}
        .content{flex:1;overflow-y:auto;padding:20px 30px;scroll-behavior:smooth}

        /* 讀取遮罩 */
        #loader{position:fixed;inset:0;background:rgba(255,255,255,0.95);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
        .p-bar-wrap{width:240px;height:8px;background:#eee;border-radius:4px;margin-top:20px;overflow:hidden}
        #p-bar{width:0%;height:100%;background:var(--red);transition:0.3s}

        /* 法條結構 */
        .blk{margin-bottom:12px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
        .bhdr{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg2);cursor:pointer;font-weight:bold;color:var(--red);border-bottom:1px solid var(--border)}
        .bbdy{padding:10px;background:#fff}
        .art{margin-bottom:8px;border:1px solid #eee;border-radius:4px}
        .art-hdr{padding:8px 12px;background:#fafafa;cursor:pointer;font-weight:500;font-size:15px;display:flex;justify-content:space-between}
        .art-body{padding:15px;line-height:2.2;font-size:17px;color:#333;display:block}
        .anum{color:var(--red)}

        /* 筆記區 */
        .note-box{margin-top:15px;background:#fffdf0;border:1px solid #e6d0a0;padding:15px;border-radius:4px}
        .note-input{width:100%;min-height:100px;border:1px solid #ddd;background:#fff;padding:10px;font-size:15px;line-height:1.6;resize:vertical;border-radius:4px;outline:none}
        .note-input:focus{border-color:var(--gold)}
    </style>
</head>
<body>

<div id="loader">
    <div id="l-msg" style="font-weight:bold;color:var(--red);font-size:18px">正在處理法規資料...</div>
    <div class="p-bar-wrap"><div id="p-bar"></div></div>
</div>

<div class="hdr">
    <div class="hdr-title">學習式六法 <small id="sync-st" style="font-size:10px;opacity:0.7">(離線)</small></div>
    <div>
        <button class="hbtn hbtn-ul" onclick="document.getElementById('fi').click()">匯入 RTF</button>
        <input type="file" id="fi" accept=".rtf" style="display:none" onchange="handleFile(event)">
        <span id="user-ui"><button class="hbtn" onclick="doLogin()">Google 登入</button></span>
    </div>
</div>

<div class="layout">
    <div class="sb">
        <div style="padding:10px"><input type="text" id="sq" placeholder="搜尋法規清單..." style="width:100%;padding:8px;border:1px solid var(--border)" oninput="renderSB(this.value)"></div>
        <div class="sb-list" id="sbl"></div>
    </div>
    <div class="main">
        <div id="toolbar" style="padding:10px; border-bottom:1px solid var(--border); display:none; background:#fff">
            <button class="hbtn" style="color:#333" onclick="expAll(true)">展開全部</button>
            <button class="hbtn" style="color:#333" onclick="expAll(false)">摺疊全部</button>
        </div>
        <div class="content" id="mv">
            <div style="text-align:center;margin-top:150px;color:#999">
                <h2>歡迎使用學習式六法</h2>
                <p style="margin-top:10px">請登入以同步雲端筆記，或直接匯入 RTF 開始閱讀</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 初始化 Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCqjGQcn6oTvR0uWQJh_B-B3YY_xqKikpE",
        authDomain: "work-2cc3f.firebaseapp.com",
        projectId: "work-2cc3f",
        appId: "1:550420160355:web:101985cfc89dbc5e573d56"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let UID = null, LAWS = {}, NOTES = {}, CUR_LAW = null;

    // 2. 登入監聽
    auth.onAuthStateChanged(async user => {
        if (user) {
            UID = user.uid;
            document.getElementById('sync-st').innerText = "(雲端同步中)";
            document.getElementById('user-ui').innerHTML = `<small>${user.displayName}</small> <button class="hbtn" onclick="auth.signOut()">登出</button>`;
            await loadCloud();
        } else {
            UID = null;
            document.getElementById('sync-st').innerText = "(離線模式)";
            document.getElementById('user-ui').innerHTML = `<button class="hbtn" onclick="doLogin()">Google 登入</button>`;
        }
    });

    function doLogin() { auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }

    // 3. RTF 解析器 (解決卡住問題)
    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const loader = document.getElementById('loader');
        const pbar = document.getElementById('p-bar');
        loader.style.display = 'flex';
        pbar.style.width = '10%';

        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                let t = ev.target.result;
                pbar.style.width = '40%';

                // 強化清洗 RTF
                t = t.replace(/\\u(-?\d+)\??/g, (_, n) => String.fromCharCode(parseInt(n) < 0 ? parseInt(n)+65536 : n))
                     .replace(/\\par|\\line/g, '\n')
                     .replace(/\\[a-z0-9-]+ ?/g, '')
                     .replace(/[{}\\]/g, '');

                const name = file.name.replace('.rtf','');
                const structure = [];
                let currentBlk = { label: "一般條文", articles: [] };

                const lines = t.split('\n');
                lines.forEach(line => {
                    const ln = line.trim();
                    if (!ln) return;

                    const mBlk = ln.match(/^第([一二三四五六七八九十百]+)([編章節])\s*(.*)/);
                    const mArt = ln.match(/^第\s*(\d+)\s*條\s*(.*)/);

                    if (mBlk) {
                        if (currentBlk.articles.length > 0) structure.push(currentBlk);
                        currentBlk = { label: mBlk[1]+mBlk[2], title: mBlk[3] || "", articles: [] };
                    } else if (mArt) {
                        currentBlk.articles.push({ n: mArt[1], c: mArt[2] || "" });
                    } else if (currentBlk.articles.length > 0) {
                        currentBlk.articles[currentBlk.articles.length-1].c += '\n' + ln;
                    }
                });
                structure.push(currentBlk);

                pbar.style.width = '80%';
                LAWS[name] = { name, structure };
                
                // 雲端備份法規
                if (UID) {
                    await db.collection('users').doc(UID).collection('laws').doc(name).set(LAWS[name]);
                } else {
                    localStorage.setItem('local_law_' + name, JSON.stringify(LAWS[name]));
                }

                renderSB();
                showLaw(name);
            } catch (err) {
                console.error("解析錯誤:", err);
                alert("檔案解析失敗，請確認是否為標準 RTF 格式。");
            } finally {
                loader.style.display = 'none';
                pbar.style.width = '0%';
            }
        };
        reader.readAsText(file, 'latin1');
    }

    // 4. UI 渲染
    function renderSB(filter = "") {
        const list = document.getElementById('sbl');
        const keys = Object.keys(LAWS).filter(k => k.includes(filter));
        list.innerHTML = keys.map(k => `<div class="sb-itm" onclick="showLaw('${k}')">⚖️ ${k}</div>`).join('');
    }

    function showLaw(name) {
        CUR_LAW = name;
        const law = LAWS[name];
        document.getElementById('toolbar').style.display = 'flex';
        let h = `<h1 style="text-align:center; color:var(--red); padding:20px 0;">${law.name}</h1>`;
        
        law.structure.forEach((blk, bIdx) => {
            h += `
            <div class="blk">
                <div class="bhdr" onclick="tog('blk-${bIdx}')">▼ ${blk.label} ${blk.title}</div>
                <div class="bbdy" id="blk-${bIdx}">`;
            
            blk.articles.forEach(art => {
                const nid = `${name}_${art.n}`;
                h += `
                <div class="art">
                    <div class="art-hdr" onclick="tog('art-${nid}')">
                        <span class="anum">第 ${art.n} 條</span>
                    </div>
                    <div class="art-body" id="art-${nid}">
                        <div style="white-space:pre-wrap">${art.c}</div>
                        <div class="note-box">
                            <div style="font-size:12px; color:var(--gold); font-weight:bold; margin-bottom:8px;">我的筆記：</div>
                            <textarea class="note-input" placeholder="在此輸入學習重點..." onblur="saveNote('${nid}', this.value)">${NOTES[nid] || ""}</textarea>
                        </div>
                    </div>
                </div>`;
            });
            h += `</div></div>`;
        });
        document.getElementById('mv').innerHTML = h;
    }

    // 5. 交互與雲端同步
    function tog(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function expAll(isExp) {
        document.querySelectorAll('.bbdy, .art-body').forEach(el => el.style.display = isExp ? 'block' : 'none');
    }

    async function saveNote(id, val) {
        NOTES[id] = val;
        if (UID) {
            await db.collection('users').doc(UID).collection('notes').doc(id).set({ c: val, ts: Date.now() });
            console.log("雲端同步成功");
        } else {
            localStorage.setItem('lx4_notes', JSON.stringify(NOTES));
        }
    }

    async function loadCloud() {
        try {
            // 抓取法規
            const lSnap = await db.collection('users').doc(UID).collection('laws').get();
            lSnap.forEach(doc => LAWS[doc.id] = doc.data());
            
            // 抓取筆記
            const nSnap = await db.collection('users').doc(UID).collection('notes').get();
            nSnap.forEach(doc => NOTES[doc.id] = doc.data().c);
            
            renderSB();
            if (CUR_LAW) showLaw(CUR_LAW);
        } catch (e) {
            console.error("雲端載入失敗:", e);
        }
    }
</script>
</body>
</html>
