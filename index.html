<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習式六法 - 備考最終修正版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap');
        :root{ --red:#8b1a1a; --bg:#f5f0e8; --bg2:#ede7d9; --border:#c8bfb0; --gold:#b8860b; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Noto Sans TC',sans-serif;font-size:13pt;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .hdr{background:var(--red);color:#fff;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
        .hbtn{padding:5px 12px;border-radius:3px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;margin-left:5px}
        .layout{display:flex;flex:1;overflow:hidden}
        .sb{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sb-list{flex:1;overflow-y:auto;padding:10px}
        .sb-itm{padding:10px;background:#fff;margin-bottom:8px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fffdfa}
        .content{flex:1;overflow-y:auto;padding:20px 30px}
        #loader{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
        .p-bar-wrap{width:200px;height:6px;background:#ddd;border-radius:3px;margin-top:10px;overflow:hidden}
        #p-bar{width:0%;height:100%;background:var(--red);transition:0.3s}
        .blk{margin-bottom:10px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
        .bhdr{padding:12px;background:var(--bg2);cursor:pointer;font-weight:bold;color:var(--red)}
        .bbdy{padding:10px;background:#fff;display:block}
        .art{margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:10px}
        .art-hdr{font-weight:bold;color:var(--red);cursor:pointer;padding:5px 0}
        .art-body{padding:10px 0;line-height:2.1;font-size:17px;display:block}
        .note-box{margin-top:10px;background:#fff9e6;padding:10px;border-radius:4px;border:1px solid #e6d0a0}
        .note-input{width:100%;min-height:60px;border:1px solid #ddd;padding:8px;font-size:15px;resize:vertical}
    </style>
</head>
<body>

<div id="loader">
    <div id="l-msg">正在處理法規...</div>
    <div class="p-bar-wrap"><div id="p-bar"></div></div>
</div>

<div class="hdr">
    <div style="font-weight:bold">學習式六法 <span id="sync-st" style="font-size:10px;opacity:0.6"></span></div>
    <div>
        <button class="hbtn" onclick="document.getElementById('fi').click()">匯入 RTF</button>
        <input type="file" id="fi" accept=".rtf" style="display:none" onchange="handleFile(event)">
        <span id="user-ui"></span>
    </div>
</div>

<div class="layout">
    <div class="sb"><div class="sb-list" id="sbl"></div></div>
    <div class="main">
        <div id="toolbar" style="padding:10px;border-bottom:1px solid var(--border);display:none">
            <button onclick="document.querySelectorAll('.bbdy, .art-body').forEach(e=>e.style.display='block')">全部展開</button>
            <button onclick="document.querySelectorAll('.bbdy, .art-body').forEach(e=>e.style.display='none')">全部摺疊</button>
        </div>
        <div class="content" id="mv"></div>
    </div>
</div>

<script>
    // 1. 初始化 Firebase (請確保你的 Firebase Console 已開啟匿名或 Google 登入)
    const firebaseConfig = {
        apiKey: "AIzaSyCqjGQcn6oTvR0uWQJh_B-B3YY_xqKikpE",
        authDomain: "work-2cc3f.firebaseapp.com",
        projectId: "work-2cc3f",
        appId: "1:550420160355:web:101985cfc89dbc5e573d56"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let UID = null, LAWS = {}, NOTES = {};

    // 2. 登入狀態
    auth.onAuthStateChanged(user => {
        if (user) {
            UID = user.uid;
            document.getElementById('sync-st').innerText = "☁️ 已連線";
            document.getElementById('user-ui').innerHTML = `<button class="hbtn" onclick="auth.signOut()">登出</button>`;
            loadCloud();
        } else {
            UID = null;
            document.getElementById('sync-st').innerText = "🚫 離線";
            document.getElementById('user-ui').innerHTML = `<button class="hbtn" onclick="auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())">登入</button>`;
        }
    });

    // 3. 核心 RTF 解析 (修正卡死問題)
    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        document.getElementById('p-bar').style.width = '20%';

        const reader = new FileReader();
        // 使用 ArrayBuffer 處理編碼，避免 Big5 亂碼導致解析出錯
        reader.onload = function(ev) {
            try {
                const decoder = new TextDecoder('big5');
                let t = decoder.decode(ev.target.result);
                document.getElementById('p-bar').style.width = '50%';

                // 清洗 RTF 標籤 (優化後的正則，防止死迴圈)
                t = t.replace(/\\u(-?\d+)\??/g, (_, n) => String.fromCharCode(n < 0 ? parseInt(n)+65536 : n));
                t = t.replace(/\\par|\\line/g, '\n').replace(/\\[a-z0-9-]+ ?/g, '').replace(/[{}\\]/g, '');

                const name = file.name.replace('.rtf','');
                const structure = [];
                let curBlk = { label: "一般條文", articles: [] };

                t.split('\n').forEach(line => {
                    const ln = line.trim();
                    if (!ln) return;
                    const mBlk = ln.match(/^第([一二三四五六七八九十百]+)([編章節])\s*(.*)/);
                    const mArt = ln.match(/^第\s*(\d+)\s*條\s*(.*)/);

                    if (mBlk) {
                        if (curBlk.articles.length > 0) structure.push(curBlk);
                        curBlk = { label: mBlk[1]+mBlk[2], title: mBlk[3], articles: [] };
                    } else if (mArt) {
                        curBlk.articles.push({ n: mArt[1], c: mArt[2] });
                    } else if (curBlk.articles.length > 0) {
                        curBlk.articles[curBlk.articles.length-1].c += '\n' + ln;
                    }
                });
                structure.push(curBlk);

                LAWS[name] = { name, structure };
                if (UID) db.collection('users').doc(UID).collection('laws').doc(name).set(LAWS[name]);
                
                renderSB();
                showLaw(name);
            } catch (err) {
                console.error(err);
                alert("解析失敗！");
            } finally {
                loader.style.display = 'none';
            }
        };
        reader.readAsArrayBuffer(file); // 改用 ArrayBuffer 提高編碼相容性
    }

    // 4. 介面渲染
    function renderSB() {
        const list = document.getElementById('sbl');
        list.innerHTML = Object.keys(LAWS).map(k => `
            <div class="sb-itm" onclick="showLaw('${k}')">
                <span>⚖️ ${k}</span>
                <span style="color:red; font-size:10px" onclick="event.stopPropagation(); deleteLaw('${k}')">❌</span>
            </div>
        `).join('');
    }

    function showLaw(name) {
        const law = LAWS[name];
        document.getElementById('toolbar').style.display = 'block';
        let h = `<h2 style="text-align:center; padding:20px;">${law.name}</h2>`;
        law.structure.forEach((blk, bIdx) => {
            h += `<div class="blk">
                <div class="bhdr" onclick="var s=this.nextElementSibling.style; s.display=s.display=='none'?'block':'none'">▼ ${blk.label} ${blk.title}</div>
                <div class="bbdy" id="blk-${bIdx}">`;
            blk.articles.forEach(art => {
                const nid = `${name}_${art.n}`;
                h += `<div class="art">
                    <div class="art-hdr" onclick="var s=this.nextElementSibling.style; s.display=s.display=='none'?'block':'none'">第 ${art.n} 條</div>
                    <div class="art-body" id="art-${nid}">
                        <div style="white-space:pre-wrap">${art.c}</div>
                        <div class="note-box">
                            <textarea class="note-input" placeholder="筆記內容..." onblur="saveNote('${nid}', this.value)">${NOTES[nid] || ""}</textarea>
                        </div>
                    </div>
                </div>`;
            });
            h += `</div></div>`;
        });
        document.getElementById('mv').innerHTML = h;
    }

    // 5. 同步功能
    async function saveNote(id, val) {
        NOTES[id] = val;
        if (UID) {
            await db.collection('users').doc(UID).collection('notes').doc(id).set({ c: val });
        } else {
            localStorage.setItem('lx4_notes', JSON.stringify(NOTES));
        }
    }

    async function loadCloud() {
        const lSnap = await db.collection('users').doc(UID).collection('laws').get();
        lSnap.forEach(d => LAWS[d.id] = d.data());
        const nSnap = await db.collection('users').doc(UID).collection('notes').get();
        nSnap.forEach(d => NOTES[d.id] = d.data().c);
        renderSB();
    }

    function deleteLaw(name) {
        if (!confirm('刪除法規？')) return;
        delete LAWS[name];
        if (UID) db.collection('users').doc(UID).collection('laws').doc(name).delete();
        renderSB();
        document.getElementById('mv').innerHTML = '';
    }
</script>
</body>
</html>
