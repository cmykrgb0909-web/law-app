<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習式六法 - 備考專用折疊版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg:#f5f0e8;--bg2:#ede7d9;--bg3:#e2dace;
  --ink:#1a1410;--ink2:#4a3f35;--ink3:#7a6e63;
  --red:#8b1a1a;--red2:#b83232;
  --gold:#b8860b;--green:#2d6a4f;--blue:#1a3a5c;
  --border:#c8bfb0;--shadow:rgba(26,20,16,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','微軟正黑體',sans-serif;font-size:13pt;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:var(--red);color:#fff;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:200}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;letter-spacing:4px;display:flex;align-items:center;gap:8px}
.seal{width:30px;height:30px;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:11px}
.hdr-btns{display:flex;gap:6px;align-items:center}
.hbtn{padding:5px 13px;border-radius:2px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn-ul{background:rgba(255,255,255,.9);color:var(--red);border-color:transparent;font-weight:500}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sb{width:265px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-srch{padding:8px 10px;border-bottom:1px solid var(--border)}
.sb-srch input{width:100%;padding:7px 10px;border:1px solid var(--border);background:var(--bg);border-radius:2px;font-size:13pt;outline:none}
.sb-list{flex:1;overflow-y:auto;padding:4px 0}
.sb-itm{padding:10px 15px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;transition:.12s;display:flex;justify-content:space-between;align-items:center}
.sb-itm:hover{background:var(--bg3)}
.sb-del{color:var(--ink3);font-size:12px;padding:2px 5px}
.sb-del:hover{color:var(--red)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#fffdfa}
.prog{display:none;padding:10px 20px;background:#eef6f3;border-bottom:1px solid var(--green);font-size:13px;color:var(--green);align-items:center;gap:10px}
.prog.on{display:flex}
.prog-tr{flex:1;height:4px;background:#ddd;border-radius:2px}
.prog-bar{height:4px;background:var(--green);width:0;transition:0.3s}

.lhdr{padding:15px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.lname{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--red)}
.tb{padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tbtn{padding:5px 10px;border:1px solid var(--border);background:var(--bg);border-radius:2px;font-size:12px;cursor:pointer}
.tbtn:hover{background:var(--red);color:#fff}
.tsep{width:1px;height:16px;background:var(--border);margin:0 5px}

.content{flex:1;overflow-y:auto;padding:20px}

/* 折疊區塊樣式 */
.blk{margin-bottom:5px}
.bhdr{display:flex;align-items:center;gap:8px;padding:10px;cursor:pointer;border-radius:4px;background:rgba(0,0,0,0.03)}
.btog{transition:transform .2s;font-size:10px}
.btog.open{transform:rotate(90deg)}
.blbl{font-weight:700;color:var(--red);min-width:60px}
.bbdy{padding-left:15px;margin-top:5px}

/* 條文樣式 */
.art{margin-bottom:8px;border:1px solid var(--border);border-radius:4px;background:#fff}
.art-hdr{padding:8px 12px;background:rgba(139,26,26,0.02);display:flex;align-items:center;gap:10px;cursor:pointer}
.art-body{padding:15px;line-height:2;white-space:pre-wrap}
.anum{color:var(--red);font-weight:bold;font-family:'JetBrains Mono'}
.anote{margin-top:10px;padding:10px;background:#fff9e6;border-left:3px solid var(--gold);font-size:14px}

/* 螢光筆顏色 */
.hy{background:#ffe066} .hg{background:#b7f0b7} .hp{background:#e8b4f8}

/* Welcome Area */
.welcome{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;color:var(--ink3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title"><div class="seal">法</div>學習式六法</div>
  <div class="hdr-btns">
    <button class="hbtn hbtn-ul" onclick="document.getElementById('fi').click()">＋ 匯入 RTF</button>
    <input type="file" id="fi" accept=".rtf,.txt" style="display:none" onchange="handleUpload(event)">
    <button class="hbtn" onclick="exportNotes()">匯出備份</button>
  </div>
</div>

<div class="layout">
  <div class="sb">
    <div class="sb-srch"><input id="sq" placeholder="搜尋已匯入法規..." oninput="renderSB(this.value)"></div>
    <div class="sb-list" id="sbl"></div>
  </div>

  <div class="main">
    <div class="prog" id="prog">
      <span id="ptxt">解析中...</span>
      <div class="prog-tr"><div class="prog-bar" id="pbar"></div></div>
    </div>
    <div id="mv" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="welcome">
            <h2>尚未載入法規</h2>
            <p>請點擊右上方按鈕匯入考試用 RTF 檔</p>
        </div>
    </div>
  </div>
</div>

<script>
'use strict';

// 儲存邏輯 (純 LocalStorage)
const LS_KEY_PREFIX = 'lx4_law:';
const NOTES = JSON.parse(localStorage.getItem('lx4_notes') || '{}');

function saveNote(key, val) {
    NOTES[key] = val;
    localStorage.setItem('lx4_notes', JSON.stringify(NOTES));
}

// RTF 解析器核心
function stripRTF(raw) {
    let s = raw;
    s = s.replace(/\\u(-?\d+)\??/g, (_, n) => {
        let code = parseInt(n, 10);
        if (code < 0) code += 65536;
        return String.fromCharCode(code);
    });
    s = s.replace(/\\par\b/g, '\n').replace(/\\line\b/g, '\n');
    s = s.replace(/\\[a-z0-9-]+ ?/g, '').replace(/[{}\\]/g, '');
    return s.trim();
}

function buildTree(text, fname) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const root = [];
    let curLaw = fname;
    let p0 = null;

    lines.forEach(ln => {
        let m;
        if (m = ln.match(/^第([一二三四五六七八九十百]+)編\s*(.*)/)) {
            p0 = { label: m[0], title: m[2], children: [], articles: [], depth: 0 };
            root.push(p0);
        } else if (m = ln.match(/^第\s*(\d+)\s*條\s*(.*)/)) {
            const art = { num: m[1], text: m[2] };
            if (p0) p0.articles.push(art);
            else {
                if (!root[0]) root.push({ label: '全文', articles: [], children: [], depth: 0 });
                root[0].articles.push(art);
            }
        }
    });
    return { name: curLaw, structure: root };
}

// 畫面渲染核心
function renderLaw(law) {
    const mv = document.getElementById('mv');
    let h = `
    <div class="lhdr"><div class="lname">${law.name}</div></div>
    <div class="tb">
        <button class="tbtn" onclick="expDepth(0)">僅看編目</button>
        <button class="tbtn" onclick="expDepth(3)">展開全條文</button>
        <div class="tsep"></div>
        <button class="tbtn" onclick="collapseAll()">全部收合</button>
    </div>
    <div class="content" id="ct">`;
    
    law.structure.forEach((nd, i) => {
        h += renderNode(nd, `nd-${i}`, 0);
    });
    
    h += '</div>';
    mv.innerHTML = h;
}

function renderNode(nd, id, d) {
    let h = `<div class="blk" data-dlv="${d}">
        <div class="bhdr" onclick="togBlk('${id}')">
            <span class="btog open" id="tog-${id}">▶</span>
            <span class="blbl">${nd.label}</span>
            <span>${nd.title || ''}</span>
        </div>
        <div class="bbdy" id="bd-${id}">`;
    
    nd.articles.forEach(a => {
        h += `
        <div class="art">
            <div class="art-hdr" onclick="togArt('art-${id}-${a.num}')">
                <span class="anum">第 ${a.num} 條</span>
            </div>
            <div class="art-body" id="art-${id}-${a.num}">
                ${a.text}
                <div class="anote" contenteditable="true" onblur="saveNote('${law.name}-${a.num}', this.innerText)">
                    ${NOTES[`${law.name}-${a.num}`] || '點此新增筆記...'}
                </div>
            </div>
        </div>`;
    });
    
    h += `</div></div>`;
    return h;
}

// 功能控制
function togBlk(id) {
    const el = document.getElementById('bd-' + id);
    const tg = document.getElementById('tog-' + id);
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    tg.classList.toggle('open', isHidden);
}

function togArt(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'none' ? '' : 'none';
}

function expDepth(depth) {
    document.querySelectorAll('.blk').forEach(b => {
        const dlv = parseInt(b.dataset.dlv);
        const bd = b.querySelector('.bbdy');
        bd.style.display = dlv <= depth ? '' : 'none';
    });
}

function collapseAll() {
    document.querySelectorAll('.bbdy, .art-body').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.btog').forEach(el => el.classList.remove('open'));
}

// 檔案上傳處理
function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const rd = new FileReader();
    const prog = document.getElementById('prog');
    const bar = document.getElementById('pbar');
    
    prog.classList.add('on');
    bar.style.width = '30%';

    rd.onload = (ev) => {
        const text = stripRTF(ev.target.result);
        bar.style.width = '70%';
        const law = buildTree(text, file.name.replace('.rtf',''));
        
        localStorage.setItem(LS_KEY_PREFIX + law.name, JSON.stringify(law));
        renderLaw(law);
        renderSB();
        
        bar.style.width = '100%';
        setTimeout(() => prog.classList.remove('on'), 1000);
    };
    rd.readAsText(file, 'latin1');
}

function renderSB(filter = '') {
    const list = document.getElementById('sbl');
    list.innerHTML = '';
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith(LS_KEY_PREFIX)) {
            const lawName = k.replace(LS_KEY_PREFIX, '');
            if (lawName.includes(filter)) {
                const div = document.createElement('div');
                div.className = 'sb-itm';
                div.innerHTML = `<span>${lawName}</span><span class="sb-del" onclick="deleteLaw('${lawName}')">刪除</span>`;
                div.onclick = () => renderLaw(JSON.parse(localStorage.getItem(k)));
                list.appendChild(div);
            }
        }
    }
}

function deleteLaw(name) {
    if(confirm('確定刪除？')) {
        localStorage.removeItem(LS_KEY_PREFIX + name);
        renderSB();
        location.reload();
    }
}

function exportNotes() {
    const data = JSON.stringify(NOTES);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'backup_notes.json';
    a.click();
}

renderSB();
</script>
</body>
</html>
