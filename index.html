<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習式六法 - 專業備考版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root { --red: #8b1a1a; --bg: #f5f0e8; --border: #c8bfb0; --gold: #b8860b; }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hdr { background: var(--red); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100; }
        .hbtn { background: white; color: var(--red); border: none; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 8px; font-size: 13px; }
        .layout { display: flex; flex: 1; overflow: hidden; }
        .sb { width: 220px; background: #ede7d9; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        .main { flex: 1; overflow-y: auto; padding: 25px; background: #fffdfa; }
        .art-card { background: white; padding: 18px; margin-bottom: 25px; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); line-height: 1.8; }
        .art-num { color: var(--red); font-weight: bold; font-size: 1.2em; border-bottom: 2px solid var(--bg); display: block; margin-bottom: 12px; padding-bottom: 5px; }
        .note-box { margin-top: 15px; padding: 10px; background: #fff9f0; border: 1px dashed var(--gold); border-radius: 6px; }
        .note-input { width: 100%; min-height: 80px; border: 1px solid #e0d0b0; background: white; padding: 8px; font-size: 14px; box-sizing: border-box; border-radius: 4px; }
        .sb-item { padding: 12px; background: white; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); text-align: center; }
        #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">正在清洗法規格式...</div>

<div class="hdr">
    <b>學習式六法 (GitHub 穩定版)</b>
    <div>
        <button class="hbtn" onclick="document.getElementById('fi').click()">匯入 RTF</button>
        <input type="file" id="fi" style="display:none" onchange="handleFile(event)">
        <span id="user-ui"><button class="hbtn" onclick="doLogin()">Google 登入同步</button></span>
    </div>
</div>

<div class="layout">
    <div class="sb" id="sbl">尚未匯入檔案</div>
    <div class="main" id="mv">請先匯入 RTF 或登入以載入雲端法規。</div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyCqjGQcn6oTvR0uWQJh_B-B3YY_xqKikpE",
        authDomain: "work-2cc3f.firebaseapp.com",
        projectId: "work-2cc3f",
        appId: "1:550420160355:web:101985cfc89dbc5e573d56"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let UID = null, LAWS = {}, NOTES = {};

    auth.onAuthStateChanged(user => {
        if (user) {
            UID = user.uid;
            document.getElementById('user-ui').innerHTML = `<small>${user.displayName}</small> <button class="hbtn" onclick="auth.signOut()">登出</button>`;
            loadCloud();
        }
    });

    function doLogin() { auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('loader').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = async (ev) => {
            let t = ev.target.result;
            // 處理 Unicode 並徹底過濾 d-400 等 RTF 格式碼
            t = t.replace(/\\u(-?\d+)\??/g, (_, n) => String.fromCharCode(parseInt(n) < 0 ? parseInt(n)+65536 : n))
                 .replace(/\\par|\\line/g, '\n')
                 .replace(/\\[a-z0-9-]+ ?/g, '') // 清除標籤
                 .replace(/d-\d[\d-]*\d/g, '')   // 專殺 d-400 格式殘留
                 .replace(/[{}\\]/g, '');

            const name = file.name.replace(/\.[^.]+$/, '');
            const arts = [];
            t.split('\n').forEach(line => {
                const ln = line.trim();
                const m = ln.match(/^第\s*(\d[\d-]*(?:之[一二三四五六七八九十百千\d]+)?)\s*條\s*(.*)?/);
                if (m) arts.push({ n: m[1], c: m[2] || "" });
                else if (arts.length > 0 && ln.length > 0) arts[arts.length - 1].c += ln;
            });

            LAWS[name] = { name: name, arts: arts };
            if (UID) await db.collection('users').doc(UID).collection('laws').doc(name).set(LAWS[name]);
            renderSB();
            showLaw(name);
            document.getElementById('loader').style.display = 'none';
        };
        reader.readAsText(file, 'latin1');
    }

    function renderSB() {
        document.getElementById('sbl').innerHTML = Object.keys(LAWS).map(k => `<div class="sb-item" onclick="showLaw('${k}')">📂 ${k}</div>`).join('');
    }

    function showLaw(name) {
        const law = LAWS[name];
        let h = `<h2>${law.name}</h2>`;
        law.arts.forEach(a => {
            const nid = `${name}_${a.n}`;
            h += `<div class="art-card">
                <span class="art-num">第 ${a.n} 條</span>
                <p>${a.c}</p>
                <div class="note-box">
                    <label style="font-size:12px; color:var(--gold);">📓 我的筆記：</label>
                    <textarea class="note-input" placeholder="輸入口訣或重點..." onblur="saveNote('${nid}', this.value)">${NOTES[nid] || ""}</textarea>
                </div>
            </div>`;
        });
        document.getElementById('mv').innerHTML = h;
        document.getElementById('mv').scrollTop = 0;
    }

    async function saveNote(id, val) {
        NOTES[id] = val;
        if (UID) await db.collection('users').doc(UID).collection('notes').doc(id).set({ c: val });
    }

    async function loadCloud() {
        const lSnap = await db.collection('users').doc(UID).collection('laws').get();
        lSnap.forEach(d => LAWS[d.id] = d.data());
        const nSnap = await db.collection('users').doc(UID).collection('notes').get();
        nSnap.forEach(d => NOTES[d.id] = d.data().c);
        renderSB();
    }
</script>
</body>
</html>
