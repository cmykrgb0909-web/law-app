<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習式六法 - 專業備考版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root { --red: #8b1a1a; --bg: #f5f0e8; --border: #c8bfb0; --gold: #b8860b; }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 頂部導覽 */
        .hdr { background: var(--red); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100; }
        .hbtn { background: white; color: var(--red); border: none; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 8px; font-size: 13px; }
        
        /* 版面配置 */
        .layout { display: flex; flex: 1; overflow: hidden; }
        .sb { width: 220px; background: #ede7d9; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 25px; background: #fffdfa; scroll-behavior: smooth; }

        /* 搜尋框 */
        .search-box { padding: 5px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 4px; width: 100%; box-sizing: border-box; }

        /* 法條卡片 */
        .art-card { background: white; padding: 18px; margin-bottom: 25px; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); line-height: 1.8; position: relative; }
        .art-num { color: var(--red); font-weight: bold; font-size: 1.2em; border-bottom: 2px solid var(--bg); display: block; margin-bottom: 12px; padding-bottom: 5px; }
        
        /* 筆記區塊 */
        .note-box { margin-top: 15px; padding: 10px; background: #fff9f0; border: 1px dashed var(--gold); border-radius: 6px; }
        .note-label { font-size: 12px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; }
        .note-input { width: 100%; min-height: 80px; border: 1px solid #e0d0b0; background: white; padding: 8px; font-size: 14px; box-sizing: border-box; border-radius: 4px; resize: vertical; }

        /* 側邊欄項目 */
        .sb-item { padding: 12px; background: white; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); text-align: center; transition: 0.2s; }
        .sb-item:hover { background: var(--red); color: white; transform: scale(1.02); }
        .sb-item.active { background: var(--red); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="hdr">
    <div style="font-size: 18px; font-weight: bold;">學習式六法 <small style="font-size: 10px; opacity: 0.8;">專業備考版</small></div>
    <div>
        <button class="hbtn" onclick="document.getElementById('fi').click()">匯入 RTF</button>
        <input type="file" id="fi" style="display:none" onchange="handleFile(event)">
        <span id="user-ui"><button class="hbtn" onclick="doLogin()">Google 登入同步</button></span>
    </div>
</div>

<div class="layout">
    <div class="sb" id="sidebar">
        <input type="text" class="search-box" placeholder="搜尋法規名稱..." oninput="renderSidebar(this.value)">
        <div id="sbl">尚未匯入</div>
    </div>
    <div class="main" id="mv">
        <div style="text-align:center; margin-top:150px; color:#999;">
            <h2>歡迎使用</h2>
            <p>請匯入包含「第 X 條」格式的 RTF 檔案開始學習。</p>
        </div>
    </div>
</div>

<script>
    // 1. Firebase 初始化
    const config = {
        apiKey: "AIzaSyCqjGQcn6oTvR0uWQJh_B-B3YY_xqKikpE",
        authDomain: "work-2cc3f.firebaseapp.com",
        projectId: "work-2cc3f",
        appId: "1:550420160355:web:101985cfc89dbc5e573d56"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let UID = null, LAWS = {}, NOTES = {};

    // 2. 登入狀態監聽
    auth.onAuthStateChanged(user => {
        if (user) {
            UID = user.uid;
            document.getElementById('user-ui').innerHTML = `<small>${user.displayName}</small> <button class="hbtn" onclick="auth.signOut()">登出</button>`;
            loadCloudData();
        } else {
            UID = null;
            document.getElementById('user-ui').innerHTML = `<button class="hbtn" onclick="doLogin()">Google 登入同步</button>`;
        }
    });

    function doLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    // 3. 檔案讀取與「強力除亂碼」邏輯
    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            let t = ev.target.result;
            
            // 強力過濾 RTF 控制碼 (解決 d-400, d-440 等問題)
            t = t.replace(/\\u(-?\d+)\??/g, (_, n) => String.fromCharCode(parseInt(n) < 0 ? parseInt(n)+65536 : n))
                 .replace(/\\par|\\line/g, '\n')
                 .replace(/\\[a-z0-9-]+ ?/g, '') // 關鍵：支援連字號的標籤過濾
                 .replace(/[{}\\]/g, '');

            const name = file.name.replace(/\.[^.]+$/, '');
            const arts = [];
            
            t.split('\n').forEach(line => {
                const ln = line.trim();
                const m = ln.match(/^第\s*(\d[\d-]*(?:之[一二三四五六七八九十百千\d]+)?)\s*條\s*(.*)?/);
                if (m) {
                    arts.push({ n: m[1], c: (m[2] || "").trim() });
                } else if (arts.length > 0 && ln.length > 0) {
                    // 排除掉剩餘的控制字元殘留
                    if (!ln.startsWith('d-')) {
                        arts[arts.length - 1].c += ln;
                    }
                }
            });

            LAWS[name] = { name: name, arts: arts };
            if (UID) await db.collection('users').doc(UID).collection('laws').doc(name).set(LAWS[name]);
            renderSidebar();
            showLaw(name);
        };
        reader.readAsText(file, 'latin1');
    }

    function renderSidebar(filter = "") {
        const container = document.getElementById('sbl');
        const keys = Object.keys(LAWS).filter(k => k.includes(filter));
        container.innerHTML = keys.map(k => `<div class="sb-item" onclick="showLaw('${k}')">📂 ${k}</div>`).join('');
    }

    // 4. 渲染法條與筆記框
    function showLaw(name) {
        const law = LAWS[name];
        const mv = document.getElementById('mv');
        let html = `<h2 style="color:var(--red); border-bottom:3px solid var(--red); padding-bottom:10px; margin-bottom:30px;">${law.name}</h2>`;
        
        law.arts.forEach(a => {
            const noteId = `${name}_${a.n}`;
            const currentNote = NOTES[noteId] || "";
            html += `
                <div class="art-card">
                    <span class="art-num">第 ${a.n} 條</span>
                    <p style="font-size:16px; color:#333;">${a.c}</p>
                    <div class="note-box">
                        <label class="note-label">📔 學習筆記 / 關鍵字記憶：</label>
                        <textarea class="note-input" 
                                  placeholder="在此輸入筆記、口訣或重點..." 
                                  onblur="saveNote('${noteId}', this.value)">${currentNote}</textarea>
                    </div>
                </div>`;
        });
        mv.innerHTML = html;
        mv.scrollTop = 0;
    }

    // 5. 雲端同步邏輯
    async function saveNote(id, val) {
        NOTES[id] = val;
        if (UID) {
            await db.collection('users').doc(UID).collection('notes').doc(id).set({ content: val, ts: Date.now() });
            console.log("筆記已同步至雲端");
        }
    }

    async function loadCloudData() {
        // 載入法規清單
        const lSnap = await db.collection('users').doc(UID).collection('laws').get();
        lSnap.forEach(doc => LAWS[doc.id] = doc.data());
        // 載入所有筆記
        const nSnap = await db.collection('users').doc(UID).collection('notes').get();
        nSnap.forEach(doc => NOTES[doc.id] = doc.data().content);
        renderSidebar();
    }
</script>
</body>
</html>
